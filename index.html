// ---------- ESCANEAR QR (cámara, para usuarios ya logueados) ----------
let jsQRLoaded = null;
function loadJsQR(){
  if (jsQRLoaded) return jsQRLoaded;
  jsQRLoaded = new Promise((resolve, reject) => {
    if (window.jsQR) return resolve(window.jsQR);
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
    s.onload = () => resolve(window.jsQR);
    s.onerror = () => reject(new Error('No se pudo cargar el lector de QR'));
    document.head.appendChild(s);
  });
  return jsQRLoaded;
}

async function abrirScannerQR(){
  let stream;
  try {
    const jsQR = await loadJsQR();
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <button class="modal-close" aria-label="Cerrar">×</button>
        <h2 style="margin-top:0;">Escaneá el QR</h2>
        <video id="scanVideo" playsinline muted style="width:100%;border-radius:14px;display:block;"></video>
        <p class="sub" style="margin-top:10px;">Apuntá al QR de tu sucursal.</p>
      </div>
    `;
    document.body.appendChild(overlay);
    const video = overlay.querySelector('#scanVideo');
    video.srcObject = stream;
    await video.play();
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    let activo = true;
    const cerrar = () => { activo = false; stream.getTracks().forEach(t => t.stop()); overlay.remove(); };
    overlay.querySelector('.modal-close').onclick = cerrar;
    overlay.addEventListener('click', (e) => { if (e.target === overlay) cerrar(); });
    function tick(){
      if (!activo) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(img.data, img.width, img.height);
        if (code && code.data) {
          let token = null;
          try { token = new URL(code.data).searchParams.get('token'); } catch (e) { /* no es una URL */ }
          if (token) {
            cerrar();
            history.replaceState(null, '', '?token=' + token);
            renderRegistro(token);
            return;
          }
        }
      }
      if (activo) requestAnimationFrame(tick);
    }
    tick();
  } catch (err) {
    if (stream) stream.getTracks().forEach(t => t.stop());
    alert('No pudimos acceder a la cámara: ' + (err && err.message ? err.message : err));
  }
}

// Envuelve cualquier promesa con un límite de tiempo. Si no responde a
// tiempo, se rechaza en vez de dejar la app colgada para siempre esperando
// (por ejemplo, si Supabase Auth no contesta getSession() en algunos
// navegadores/entornos).
function withTimeout(promise, ms = 6000, label = 'operación'){
  return Promise.race([
    Promise.resolve(promise),
    new Promise((_, reject) => setTimeout(() => reject(new Error(`TIMEOUT: ${label} tardó demasiado`)), ms)),
  ]);
}

// Obtiene la sesión de forma segura. Si el estado guardado en el navegador
// está corrupto (puede pasar tras un registro con auto-login), en vez de
// romper toda la app, se limpia y se sigue como visitante. También protege
// contra el caso en que getSession() se quede colgado sin responder nunca.
// Si varias partes de la app piden la sesión casi al mismo tiempo (nav +
// vista actual), comparten un solo pedido en vez de duplicarlo — así el
// router no espera dos veces por lo mismo.
let _sessionInFlight = null;
async function safeGetSession(){
  if (_sessionInFlight) return _sessionInFlight;
  _sessionInFlight = (async () => {
    try {
      const { data, error } = await withTimeout(sb.auth.getSession(), 10000, 'verificar sesión');
      if (error) throw error;
      return (data && data.session) || null;
    } catch (err) {
      // No forzamos signOut acá: si la red estuvo lenta un instante, cerrar la
      // sesión de golpe es peor que solo reintentar en el próximo render.
      console.error('No se pudo verificar la sesión (se reintentará):', err);
      return null;
    } finally {
      _sessionInFlight = null;
    }
  })();
  return _sessionInFlight;
}

// Pantalla de emergencia: se muestra si algo revienta y no queremos
// dejar al usuario con una página en blanco sin salida.
function renderErrorFallback(err){
  console.error('Error en la app:', err);
  app.innerHTML = `
    <div class="hero"><h1>Algo salió mal</h1><p>Hubo un problema al cargar esta pantalla.</p></div>
    <div class="card">
      <p class="sub">Podés intentar de nuevo o volver al inicio. Si el problema sigue, probá cerrar sesión.</p>
      <button class="cta" id="btnReintentar">Reintentar</button>
      <button class="cta ghost" id="btnVolverInicio" style="margin-top:10px;">Volver al inicio</button>
      <button class="link-btn" id="btnCerrarSesionErr" style="display:block;margin:16px auto 0;">Cerrar sesión y volver al inicio</button>
    </div>
  `;
  navbtns.innerHTML = `<a class="icon-btn primary" href="?">Inicio</a>`;
  document.getElementById('btnReintentar').onclick = () => router();
  document.getElementById('btnVolverInicio').onclick = () => { location.href = '?'; };
  document.getElementById('btnCerrarSesionErr').onclick = async () => {
    try { await sb.auth.signOut(); } catch (e) { /* noop */ }
    location.href = '?';
  };
}

// ---------- ROUTER ----------
async function router(){
  try {
    stopLive();
    const params = new URLSearchParams(location.search);
    const view = params.get('view');
    const token = params.get('token');
    renderNav(); // corre en paralelo, no bloquea el contenido principal

    if (token) return await renderRegistro(token);
    if (view === 'login') return await renderLogin();
    if (view === 'nueva-clave') return renderNuevaClave();
    if (view === 'dashboard') return await renderDashboard();
    if (view === 'admin') return await renderAdmin();
    return await renderHome();
  } catch (err) {
    renderErrorFallback(err);
  }
}

  // en el escaneo de QR esto ahorra una vuelta completa de red.
  const infoPromise = token
    ? withTimeout(sb.rpc('sucursal_info', { p_token: token }), 8000, 'cargar sucursal').catch(err => ({ data: null, error: err }))
    : Promise.resolve({ data: null, error: null });
  const sessionPromise = safeGetSession();

  if (token) {
    const { data, error } = await infoPromise;
    info = (data && data[0]) || null;
    if (error || !info) {
      app.innerHTML = `<div class="card"><h2>QR no válido</h2><p class="sub">Este código no existe o la sucursal no está activa. Pedí ayuda en el mostrador.</p><button class="cta ghost" id="btnVolverInicioQr">Volver al inicio</button></div>`;

      return;
    }

  // Usuario ya logueado + concurso activo en esta sucursal → "un toque" en vez del formulario completo
  if (token && info && info.concurso_activo && session) {
    renderUnirseConcurso(token, info, session);
    return;
  }

  const cuposRestantes = (info && info.concurso_activo) ? Math.max(0, 50 - info.cupos_usados) : null;

  app.innerHTML = `
    ${info ? (info.concurso_activo ? `
      <div class="hero">
        <span class="pill">🔥 Concurso en vivo · ${esc(info.partido_rival || ('Partido ' + info.partido_numero))}</span>
        <h1>${esc(info.sucursal_nombre)}</h1>

        <div class="stat"><b>${cuposRestantes}</b><span>Cupos libres</span></div>
        <div class="stat"><b>50</b><span>Ganan medio Guchini</span></div>
      </div>
    ` : `

        <span class="pill">Registro general</span>
        <h1>${esc(info.sucursal_nombre)}</h1>
        <p>${esc(info.sucursal_direccion)}</p>
      </div>
      <div class="card" style="margin-top:16px;">
        <p class="sub" style="margin:0;">Ahora mismo no hay ningún concurso activo en esta sucursal. Igual te podés registrar para sumarte a nuestra base — en cuanto Argentina gane y el local active el concurso, los próximos que escaneen este mismo QR van a competir por el medio Guchini.</p>

    `) : `

    `}

    <div class="card">
      <h2>Tus datos</h2>
      <p class="sub">Completá el formulario para registrarte${(info && info.concurso_activo) ? ' y anotarte en el concurso de este partido' : ''}.</p>
      <form id="formReg">
        <label>Nombre y apellido</label>
        <input type="text" name="nombre" required minlength="2" placeholder="Juan Pérez" />
        <label>Email</label>
        <input type="email" name="email" required placeholder="tu@email.com" />
        <label>Celular</label>
        <input type="tel" name="celular" required minlength="6" placeholder="261 123 4567" />
        <label>Fecha de nacimiento</label>
        <input type="date" name="fecha_nacimiento" required />
        <label>Elegí una contraseña</label>
        <input type="password" name="password" required minlength="6" placeholder="Mínimo 6 caracteres" />
        <label>Repetí la contraseña</label>
        <input type="password" name="password2" required minlength="6" placeholder="Repetí tu contraseña" />
        <div class="check-row">
          <input type="checkbox" id="consent" required />
          <span>Acepto que Guchini use mis datos únicamente para esta promoción y para enviarme novedades. Con este email y contraseña vas a poder entrar a ver tu posición.</span>
        </div>
        <div class="check-row">
          <input type="checkbox" id="consentTerminos" required />
          <span>Leí y acepto los <button type="button" class="link-btn" id="linkTerminosReg" style="font-size:12px;">términos y condiciones y las reglas del concurso</button>.</span>

        <button class="cta" type="submit" id="btnSubmit">Confirmar registro</button>

    const msgBox = document.getElementById('regMsg');
    msgBox.innerHTML = '';
    btn.disabled = true; btn.textContent = 'Enviando...';

    const fd = new FormData(e.target);
    const password = fd.get('password');
    const password2 = fd.get('password2');
    if (password !== password2) {
      msgBox.innerHTML = `<div class="msg err">Las contraseñas no coinciden.</div>`;
      btn.disabled = false; btn.textContent = 'Confirmar registro';
      return;
    }
    const email = fd.get('email');
    const payload = {
      action: 'register',
      nombre: fd.get('nombre'),
      email,
      celular: fd.get('celular'),
      fecha_nacimiento: fd.get('fecha_nacimiento'),
      password,
      qr_token: token || null,
    };

    try {
      const res = await withTimeout(fetch(FUNCTIONS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'apikey': SUPABASE_ANON_KEY },
        body: JSON.stringify(payload),
      }), 10000, 'enviar registro');

      if (!res.ok) {
        msgBox.innerHTML = `<div class="msg err">${esc(data.message || 'No pudimos completar el registro. Probá de nuevo.')}</div>`;
        btn.disabled = false; btn.textContent = 'Confirmar registro';
        return;
      }

      // Login automático con la contraseña recién elegida
      await sb.auth.signInWithPassword({ email, password });
      renderResultado(data);
    } catch (err) {
      msgBox.innerHTML = `<div class="msg err">Error de conexión. Probá de nuevo en unos segundos.</div>`;
      btn.disabled = false; btn.textContent = 'Confirmar registro';
    }
  });
}

// "Un toque": usuario ya logueado escanea el QR de una sucursal con concurso activo
async function renderUnirseConcurso(token, info, session){
  // Confirmación automática: llegar acá ya significa "logueado + escaneó un QR con concurso activo",
  // así que anotamos directo sin pedir un clic extra.
  app.innerHTML = `
    <div class="hero">
      <span class="pill">🔥 Concurso en vivo · ${esc(info.partido_rival || ('Partido ' + info.partido_numero))}</span>
      <h1>${esc(info.sucursal_nombre)}</h1>
    </div>
    <div class="card">
      <div class="loader">Confirmando tu lugar...</div>
      <p class="sub" style="text-align:center;">Sesión: <b>${esc(session.user.email)}</b></p>
      <p style="text-align:center;margin-top:14px;"><button class="link-btn" id="btnNoSoyYo2">¿No sos vos? Cerrar sesión y registrar a otra persona</button></p>
    </div>
  `;
  document.getElementById('btnNoSoyYo2').onclick = async () => { await sb.auth.signOut(); router(); };

  const { data, error } = await sb.rpc('unirse_concurso', { p_qr_token: token });
  if (error) {
    const msg = error.message || '';
    let texto = 'No pudimos confirmar tu lugar. Probá de nuevo.';
    if (msg.includes('YA_REGISTRADO_PROMO')) texto = 'Ya estás anotado en este concurso. Mostrá tu cuenta en el mostrador.';
    else if (msg.includes('YA_REGISTRADO_OTRO_LOCAL')) texto = 'Ya te anotaste en este mismo partido en otra sucursal. Solo se puede en un local por partido.';
    else if (msg.includes('CONCURSO_PAUSADO')) texto = 'El concurso de esta sucursal está pausado en este momento. Probá en unos minutos.';
    else if (msg.includes('SIN_CONCURSO_ACTIVO')) texto = 'El concurso ya cerró.';
    else if (msg.includes('SIN_PERFIL')) { renderRegistro(token); return; }
    app.innerHTML = `<div class="card"><div class="msg err">${esc(texto)}</div><button class="cta ghost" id="btnVolverInicioUnirse" style="margin-top:14px;">Volver al inicio</button></div>`;
    document.getElementById('btnVolverInicioUnirse').onclick = () => { history.pushState(null, '', '?'); renderNav(); renderHome(); };
    return;
  }
  const r = Array.isArray(data) ? data[0] : data;
  renderResultado({ modo: r.modo, posicion: r.posicion, ganador: r.ganador, sucursal: r.sucursal_nombre, partido_numero: r.partido_numero });
}

  if (data.modo === 'concurso' && data.posicion) {
    body = data.ganador ? `
      <div class="result-big">
        <div class="trophy">🥪🎉</div>
        <div class="num">#${data.posicion}</div>
        <div class="cap">¡Ganaste medio Guchini gratis!</div>
      </div>
      <p class="sub" style="text-align:center;">Fuiste de los primeros 50 en <b>${esc(data.sucursal)}</b>. Mostrá tu cuenta en el mostrador para retirarlo.</p>
    ` : `
      <div class="result-big">
        <div class="trophy">🇦🇷</div>
        <div class="num">#${data.posicion}</div>
        <div class="cap">Puesto de llegada</div>
      </div>
      <p class="sub" style="text-align:center;">Esta vez no llegaste entre los primeros 50 en <b>${esc(data.sucursal)}</b>, ¡pero seguimos jugando cada partido!</p>
    `;
  } else {
    body = `
      <div class="result-big">
        <div class="trophy">🥪</div>
        <div class="cap">¡Listo, quedaste registrado!</div>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="card">
      ${body}
      ${esCuenta ? '' : `
      <div class="msg ok">
        ✅ Ya quedaste con tu cuenta activa. Entrá cuando quieras con tu email y contraseña para ver tu posición.
      </div>
      <button class="cta" id="btnVerCuentaResultado">Ver mi cuenta</button>
      `}
      <button class="cta ghost" id="btnVolverInicioResultado" style="margin-top:10px;">Volver al inicio</button>
      ${esCuenta ? `<button class="link-btn" id="btnLogoutResultado" style="display:block;margin:16px auto 0;">Cerrar sesión</button>` : ''}
    </div>
  `;
  if (!esCuenta) {
    document.getElementById('btnVerCuentaResultado').onclick = () => { history.pushState(null, '', '?view=dashboard'); renderDashboard(); };
  }
  document.getElementById('btnVolverInicioResultado').onclick = () => { history.pushState(null, '', '?'); renderNav(); renderHome(); };
  if (esCuenta) {
    document.getElementById('btnLogoutResultado').onclick = async () => { await sb.auth.signOut(); location.href = '?'; };
  }
}

    const fd = new FormData(e.target);

      msgBox.innerHTML = `<div class="msg err">Email/usuario o contraseña incorrectos.</div>`;
      btn.disabled = false; btn.textContent = 'Ingresar';
      return;
    }
    history.replaceState(null, '', '?view=dashboard');

      <h2><span class="live-dot"></span>Lista en vivo de tu sucursal</h2>
      <p class="sub">${misSucursalNombre ? esc(misSucursalNombre) : 'Tu sucursal'} — se actualiza sola. Solo se ve la sucursal donde te registraste.</p>
      ${misPartidos.length > 1 ? `<select id="selPartido">${misPartidos.map(n => `<option value="${n}">Partido ${n}</option>`).join('')}</select>` : ''}
      <div id="leaderboardBox" style="margin-top:14px;"></div>
    </div>
    ` : ''}

    ${admin ? `<div class="card"><h2>Panel de administración</h2><p class="sub">Acceso habilitado (${admin.role === 'super' ? 'superadmin' : 'admin de sucursal'}).</p><a class="cta" style="display:block;text-align:center;text-decoration:none;" href="?view=admin">Ir al panel</a></div>` : ''}

    <div class="card">
      <h2>Contraseña</h2>
      <form id="formCambiarClave">
        <label>Nueva contraseña</label>
        <input type="password" name="password" required minlength="6" placeholder="Mínimo 6 caracteres" />
        <button class="cta slim" type="submit" id="btnCambiarClave">Cambiar contraseña</button>
      </form>
      <div id="cambiarClaveMsg"></div>
    </div>

    <div class="card">
      <button class="cta ghost" id="btnLogout">Cerrar sesión</button>
    </div>
  `;

  document.getElementById('btnVerManualCliente').onclick = () => mostrarManual('cliente');
  document.getElementById('btnEscanear').onclick = async () => {
    const btn = document.getElementById('btnEscanear');
    btn.disabled = true; btn.textContent = 'Abriendo cámara...';
    await abrirScannerQR();
    btn.disabled = false; btn.textContent = '📷 Escanear QR';
  };

  document.getElementById('formCambiarClave').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnCambiarClave');
    const msgBox = document.getElementById('cambiarClaveMsg');
    btn.disabled = true; btn.textContent = 'Guardando...';
    const fd = new FormData(e.target);
    const { error } = await sb.auth.updateUser({ password: fd.get('password') });
    msgBox.innerHTML = error
      ? `<div class="msg err">No pudimos cambiar la contraseña.</div>`
      : `<div class="msg ok">✅ Contraseña actualizada.</div>`;
    btn.disabled = false; btn.textContent = 'Cambiar contraseña';
    e.target.reset();
  });

  if (misSucursalSlug) {
    const loadLeaderboard = async () => {
      const selEl = document.getElementById('selPartido');
      const numero = selEl ? parseInt(selEl.value, 10) : misPartidos[0];
      const box = document.getElementById('leaderboardBox');
      if (!box) return;
      const { data, error } = await sb.rpc('get_leaderboard', { p_sucursal_slug: misSucursalSlug, p_partido_numero: numero });
      if (error || !data || !data.length) {
        box.innerHTML = `<p class="sub">Todavía no hay registros para este partido en tu sucursal.</p>`;
        return;
      }
      box.innerHTML = `
        <table>
          <thead><tr><th>#</th><th>Nombre</th><th></th></tr></thead>
          <tbody>
            ${data.map(r => {
              const medalla = r.posicion === 1 ? '🥇 ' : r.posicion === 2 ? '🥈 ' : r.posicion === 3 ? '🥉 ' : '';
              const esYo = r.nombre_public && session.user.user_metadata && (session.user.user_metadata.nombre||'').startsWith(r.nombre_public.split(' ')[0]);
              return `
              <tr class="${esYo ? 'me' : ''}">
                <td>${medalla}${r.posicion}</td>
                <td>${esc(r.nombre_public)}</td>
                <td>${r.ganador ? '<span class="tag">Ganó</span>' : ''}</td>
              </tr>
            `;}).join('')}
          </tbody>
        </table>
      `;
    };
    const selEl = document.getElementById('selPartido');
    if (selEl) selEl.addEventListener('change', loadLeaderboard);
    loadLeaderboard();
    stopLive();
    liveTimer = setInterval(loadLeaderboard, 5000);
  }

  document.getElementById('btnLogout').onclick = async () => {
    await sb.auth.signOut();
    location.href = '?';
  };
}

// ---------- ADMIN ----------
async function renderAdmin(adminInfoPrefetched){
  let adminInfo = adminInfoPrefetched;

  if (!adminInfo) {
    const session = await safeGetSession();
    if (!session) { location.href = '?view=login'; return; }

    app.innerHTML = `<div class="loader">Verificando acceso...</div>`;
    let adminInfoData, adminInfoErr;
    try {
      ({ data: adminInfoData, error: adminInfoErr } = await withTimeout(sb.rpc('mi_admin_info'), 8000, 'verificar admin'));
    } catch (timeoutErr) {
      adminInfoErr = timeoutErr;
    }
    if (adminInfoErr) {
      app.innerHTML = `<div class="card"><h2>No pudimos verificar tu acceso</h2><p class="sub">Probá recargar la página en unos segundos.</p><button class="cta" id="btnRetryAdmin">Reintentar</button></div>`;
      document.getElementById('btnRetryAdmin').onclick = () => router();
      return;
    }
    adminInfo = Array.isArray(adminInfoData) ? adminInfoData[0] : adminInfoData;
  }
  if (!adminInfo || !adminInfo.role) {
    app.innerHTML = `<div class="card"><h2>Acceso denegado</h2><p class="sub">Esta cuenta no tiene permisos de administrador.</p></div>`;
    return;
  }
  const isSuper = adminInfo.role === 'super';
  const miSucursal = adminInfo.sucursal_slug;

  // Ordenar sucursales: la propia primero (admin normal)
  const sucursalesOrden = [...SUCURSALES].sort((a, b) => {
    if (a.slug === miSucursal) return -1;
    if (b.slug === miSucursal) return 1;
    return 0;
  });

  app.innerHTML = `
    <div class="hero">
      <h1>Panel Guchini Mundial</h1>
      <p><span class="tag role">${isSuper ? 'Superadmin' : 'Admin de sucursal'}</span></p>
      <p class="sub">${isSuper ? 'Activá el concurso cuando gane Argentina' : `Viendo por defecto: ${esc(adminInfo.sucursal_nombre || 'sin sucursal asignada')}`}</p>
      <p style="text-align:center;">
        <button class="link-btn" id="btnVerManual">📘 Manual del panel</button>
        &nbsp;·&nbsp;
        <button class="link-btn" id="btnLogoutAdmin">Cerrar sesión</button>
      </p>
    </div>
    ${isSuper ? `<div id="statsBox"></div>` : ''}

    ${isSuper ? `
    <div class="card">
      <h2>🇦🇷 Argentina ganó</h2>
      <p class="sub">Activa el concurso en las 3 sucursales al mismo tiempo, para el mismo partido.</p>
      <div class="grid2">
        <select id="globalPartido">${PARTIDOS.map(n => `<option value="${n}">${partidoLabel(n)}</option>`).join('')}</select>
        <button class="cta" id="btnActivarTodas">Activar en todas</button>
      </div>
      <div id="globalActivarMsg"></div>
    </div>
    ` : ''}

    <div id="sucursalesBox"></div>

    <div class="card">
      <h2><span class="live-dot"></span>Lista en vivo</h2>
      <p class="sub">Se actualiza sola cada pocos segundos mientras esta pantalla esté abierta.</p>
      <select id="liveSucursal">${sucursalesOrden.map(s => `<option value="${s.slug}">${esc(s.nombre)}${s.slug === miSucursal ? ' (tu sucursal)' : ''}</option>`).join('')}</select>
      <div id="liveBox" style="margin-top:14px;"></div>
    </div>

    ${isSuper ? `
    <div class="card">
      <h2>Detalle de registros (con datos de contacto)</h2>
      <div class="grid2">
        <select id="admSucursal"><option value="">Todas las sucursales</option>${SUCURSALES.map(s => `<option value="${s.slug}">${esc(s.nombre)}</option>`).join('')}</select>
        <label style="display:flex;align-items:center;gap:8px;margin:14px 0 0;font-weight:500;color:var(--text);">
          <input type="checkbox" id="admSoloConcurso" style="width:auto;" /> Solo concurso
        </label>
      </div>
      <button class="cta" id="btnFiltrar" style="margin-top:12px;">Buscar</button>
      <button class="cta ghost" id="btnCsv" style="margin-top:10px;">Descargar CSV</button>
      <div id="admBox" style="margin-top:14px;overflow-x:auto;"></div>
    </div>
    ` : ''}
  `;

  async function loadStats(){
    if (!isSuper) return;
    const { data: stats } = await sb.rpc('admin_stats');
    const s = (stats && stats[0]) || { total_registros: 0, total_concurso: 0, total_general: 0, total_ganadores: 0 };
    document.getElementById('statsBox').innerHTML = `
      <div class="stat-grid">
        <div class="stat"><b>${s.total_registros}</b><span>Total registros</span></div>
        <div class="stat"><b>${s.total_concurso}</b><span>En concursos</span></div>
        <div class="stat"><b>${s.total_ganadores}</b><span>Ganadores</span></div>
      </div>
    `;
  }

  async function loadSucursales(){
    const box = document.getElementById('sucursalesBox');
    box.innerHTML = `<div class="loader">Cargando sucursales...</div>`;
    const { data, error } = await sb.rpc('admin_estado_sucursales');
    if (error || !data) { box.innerHTML = `<div class="msg err">No se pudo cargar el estado de las sucursales.</div>`; return; }

    const ordenado = [...data].sort((a, b) => {
      if (a.sucursal_slug === miSucursal) return -1;
      if (b.sucursal_slug === miSucursal) return 1;
      return 0;
    });

    box.innerHTML = ordenado.map(s => `
      <div class="card" data-card="${s.sucursal_slug}">
        <h2>${esc(s.sucursal_nombre)} ${s.sucursal_slug === miSucursal ? '<span class="tag muted">tu sucursal</span>' : ''}</h2>
        ${s.concurso_activo ? `
          <p class="sub" style="margin:0 0 12px;">
            <span class="tag${s.concurso_pausado ? ' muted' : ''}">${s.concurso_pausado ? 'Concurso pausado' : 'Concurso activo'}</span>
            &nbsp;${esc(s.partido_rival || ('Partido ' + s.partido_numero))} · ${s.cupos_usados}/50 registrados
          </p>
          ${isSuper ? `
          <div class="grid2">
            ${s.concurso_pausado
              ? `<button class="cta" data-reanudar="${s.sucursal_slug}">Reanudar</button>`
              : `<button class="cta ghost" data-pausar="${s.sucursal_slug}">Pausar</button>`}
            <button class="cta ghost" data-cerrar="${s.sucursal_slug}">Cerrar concurso</button>
          </div>
          <button class="cta ghost slim" data-cancelar="${s.sucursal_slug}" style="margin-top:8px;color:var(--danger);border-color:var(--danger);">Cancelar y reiniciar</button>
          ` : ''}
        ` : `
          <p class="sub" style="margin:0 0 12px;">Sin concurso activo. El QR de esta sucursal registra en modo general.</p>
          ${isSuper ? `
          <div class="grid2">
            <select data-partido-select="${s.sucursal_slug}">${PARTIDOS.map(n => `<option value="${n}">${partidoLabel(n)}</option>`).join('')}</select>
            <button class="cta" data-activar="${s.sucursal_slug}">Marcar partido ganado</button>
          </div>
          ` : ''}
        `}
        <button class="cta ghost slim" data-verqr="${s.sucursal_slug}" data-nombre="${esc(s.sucursal_nombre)}" style="margin-top:8px;">📱 Ver / descargar QR</button>
      </div>
    `).join('');

    box.querySelectorAll('[data-verqr]').forEach(function(btn){
      btn.addEventListener('click', function(){
        showQrModal(btn.getAttribute('data-verqr'), btn.getAttribute('data-nombre'));
      });
    });

    box.querySelectorAll('[data-activar]').forEach(function(btn){
      btn.addEventListener('click', async function(){
        const slug = btn.getAttribute('data-activar');
        const sel = box.querySelector('[data-partido-select="' + slug + '"]');
        const numero = parseInt(sel.value, 10);
        btn.disabled = true; btn.textContent = 'Activando...';
        const { error } = await sb.rpc('activar_concurso', { p_sucursal_slug: slug, p_partido_numero: numero });
        if (error) { alert('No se pudo activar: ' + error.message); }
        await loadSucursales();
        await loadStats();
      });
    });

    box.querySelectorAll('[data-cerrar]').forEach(function(btn){
      btn.addEventListener('click', async function(){
        const slug = btn.getAttribute('data-cerrar');
        btn.disabled = true; btn.textContent = 'Cerrando...';
        const { error } = await sb.rpc('cerrar_concurso', { p_sucursal_slug: slug });
        if (error) { alert('No se pudo cerrar: ' + error.message); }
        await loadSucursales();
        await loadStats();
      });
    });

    box.querySelectorAll('[data-pausar]').forEach(function(btn){
      btn.addEventListener('click', async function(){
        const slug = btn.getAttribute('data-pausar');
        btn.disabled = true; btn.textContent = 'Pausando...';
        const { error } = await sb.rpc('pausar_concurso', { p_sucursal_slug: slug });
        if (error) { alert('No se pudo pausar: ' + error.message); }
        await loadSucursales();
        await loadStats();
      });
    });

    box.querySelectorAll('[data-reanudar]').forEach(function(btn){
      btn.addEventListener('click', async function(){
        const slug = btn.getAttribute('data-reanudar');
        btn.disabled = true; btn.textContent = 'Reanudando...';
        const { error } = await sb.rpc('reanudar_concurso', { p_sucursal_slug: slug });
        if (error) { alert('No se pudo reanudar: ' + error.message); }
        await loadSucursales();
        await loadStats();
      });
    });

    box.querySelectorAll('[data-cancelar]').forEach(function(btn){
      btn.addEventListener('click', async function(){
        const slug = btn.getAttribute('data-cancelar');
        if (!confirm('¿Cancelar este concurso? Los registros ya hechos quedan guardados para siempre (no se borran), pero el concurso se cierra y podrás activar uno nuevo desde cero.')) return;
        btn.disabled = true; btn.textContent = 'Cancelando...';
        const { error } = await sb.rpc('cancelar_concurso', { p_sucursal_slug: slug });
        if (error) { alert('No se pudo cancelar: ' + error.message); }
        await loadSucursales();
        await loadStats();
      });
    });
  }

  // ---- Popup de QR por sucursal ----
  function showQrModal(slug, nombre){
    const isSel = document.body.classList.contains('modo-seleccion');
    const src = `guchini_qr_${slug}_${isSel ? 'seleccion' : 'clasico'}.png`;
    const fallback = `guchini_qr_${slug}_clasico.png`;
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <button class="modal-close" aria-label="Cerrar">×</button>
        <h2 style="margin-top:0;">${esc(nombre)}</h2>
        <img id="qrModalImg" src="${src}" alt="QR ${esc(nombre)}" />
        <a class="cta" style="display:block;text-decoration:none;margin-top:16px;" id="qrDownload" href="${src}" download="guchini_qr_${slug}.png">Descargar para imprimir</a>
      </div>
    `;
    document.body.appendChild(overlay);
    const img = overlay.querySelector('#qrModalImg');
    img.onerror = () => {
      img.src = fallback;
      overlay.querySelector('#qrDownload').href = fallback;
    };
    const close = () => overlay.remove();
    overlay.querySelector('.modal-close').onclick = close;
    overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  }

  if (isSuper) {
    document.getElementById('btnActivarTodas').addEventListener('click', async () => {
      const btn = document.getElementById('btnActivarTodas');
      const msgBox = document.getElementById('globalActivarMsg');
      const numero = parseInt(document.getElementById('globalPartido').value, 10);
      if (!confirm(`¿Activar el concurso del Partido ${numero} en las 3 sucursales ahora?`)) return;
      btn.disabled = true; btn.textContent = 'Activando...';
      msgBox.innerHTML = '';
      const resultados = await Promise.all(SUCURSALES.map(async (s) => {
        const { error } = await sb.rpc('activar_concurso', { p_sucursal_slug: s.slug, p_partido_numero: numero });
        return { nombre: s.nombre, ok: !error, error };
      }));
      const fallidas = resultados.filter(r => !r.ok);
      msgBox.innerHTML = fallidas.length
        ? `<div class="msg err">Falló en: ${fallidas.map(f => esc(f.nombre)).join(', ')}.</div>`
        : `<div class="msg ok">✅ Concurso activado en las 3 sucursales.</div>`;
      btn.disabled = false; btn.textContent = 'Activar en todas';
      await loadSucursales();
      await loadStats();
    });
  }

  // ---- Lista en vivo (polling) ----
  async function loadLive(){
    const slug = document.getElementById('liveSucursal').value;
    const box = document.getElementById('liveBox');
    const { data, error } = await sb.rpc('admin_lista_vivo', { p_sucursal_slug: slug });
    if (error) { box.innerHTML = `<p class="sub">No se pudo cargar la lista en vivo.</p>`; return; }
    if (!data || !data.length) { box.innerHTML = `<p class="sub">Todavía no hay nadie anotado en el concurso de esta sucursal.</p>`; return; }
    const activo = data[0].concurso_activo;
    box.innerHTML = `
      <p class="sub" style="margin:0 0 8px;">${activo ? '<span class="tag">Concurso activo</span>' : '<span class="tag muted">Último concurso (cerrado)</span>'} · ${data.length}/50</p>
      <table>
        <thead><tr><th>#</th><th>Cliente</th><th>Nombre</th><th>Hora</th><th></th></tr></thead>
        <tbody>
          ${data.map(r => {
            const medalla = r.posicion === 1 ? '🥇 ' : r.posicion === 2 ? '🥈 ' : r.posicion === 3 ? '🥉 ' : '';
            const podio = r.posicion && r.posicion <= 3 ? 'style="background:var(--accent-soft);font-weight:700;"' : '';
            return `
            <tr ${podio}>
              <td>${medalla}${r.posicion ?? '—'}</td>
              <td>#${r.numero_cliente ?? '—'}</td>
              <td>${esc(r.nombre)}</td>
              <td>${new Date(r.creado_en).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })}</td>
              <td>${r.ganador ? '🏆' : ''}</td>
            </tr>
          `;}).join('')}
        </tbody>
      </table>
    `;
  }
  document.getElementById('liveSucursal').value = miSucursal && sucursalesOrden.some(s => s.slug === miSucursal) ? miSucursal : sucursalesOrden[0].slug;
  document.getElementById('liveSucursal').addEventListener('change', loadLive);
  stopLive();
  loadLive();
  liveTimer = setInterval(loadLive, 4000);

  // ---- Detalle + CSV (solo superadmin) ----
  let lastRows = [];
  if (isSuper) {
    async function loadAdmin(){
      const slug = document.getElementById('admSucursal').value || null;
      const soloConcurso = document.getElementById('admSoloConcurso').checked;
      const box = document.getElementById('admBox');
      box.innerHTML = `<div class="loader">Cargando...</div>`;
      const { data, error } = await sb.rpc('admin_dashboard', { p_sucursal_slug: slug, p_solo_concurso: soloConcurso });
      lastRows = data || [];
      if (error || !lastRows.length) { box.innerHTML = `<p class="sub">Sin resultados.</p>`; return; }
      box.innerHTML = `
        <table>
          <thead><tr><th>Cliente</th><th>Nombre</th><th>Email</th><th>Celular</th><th>Sucursal</th><th>Partido</th><th>Puesto</th></tr></thead>
          <tbody>
            ${lastRows.map(r => `
              <tr>
                <td>#${r.numero_cliente ?? '—'}</td>
                <td>${esc(r.nombre)}</td><td>${esc(r.email)}</td><td>${esc(r.celular)}</td>
                <td>${esc(r.sucursal||'General')}</td><td>${r.partido_numero ? '#'+r.partido_numero : '—'}</td>
                <td>${r.posicion ?? '—'}${r.ganador ? ' 🏆' : ''}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    document.getElementById('btnFiltrar').onclick = loadAdmin;
    document.getElementById('btnCsv').onclick = function(){
      if (!lastRows.length) return;
      const headers = ['numero_cliente','nombre','email','celular','fecha_nacimiento','sucursal','partido_numero','modo','posicion','ganador','creado_en'];
      const csv = [headers.join(',')].concat(lastRows.map(function(r){
        return headers.map(function(h){ return '"' + String(r[h] ?? '').replace(/"/g,'""') + '"'; }).join(',');
      })).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'guchini_registros.csv';
      a.click();
    };

    loadAdmin();
  }

  loadStats();
  loadSucursales();
  document.getElementById('btnLogoutAdmin').onclick = async () => { await sb.auth.signOut(); location.href = '?'; };
  document.getElementById('btnVerManual').onclick = () => mostrarManual(isSuper ? 'super' : 'admin');
}

window.addEventListener('unhandledrejection', (ev) => {
  // Red de seguridad: si algo async se rompe sin ser atrapado en ningún lado,
  // no dejamos al usuario mirando una pantalla vacía.
  if (!app.innerHTML.trim() || app.querySelector('.loader')) {
    renderErrorFallback(ev.reason);
  }
});

sb.auth.onAuthStateChange(() => renderNav());
window.addEventListener('popstate', () => router());
router();
</script>
</body>
</html>
